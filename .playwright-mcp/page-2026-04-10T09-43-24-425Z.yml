                - paragraph [ref=e421]: The soma code prototype was refactored from a top-tier open-source project.
                - paragraph [ref=e422]: Soma Code is a terminal-first AI coding CLI designed for working directly inside local projects. It helps you understand repositories, edit code, configure model providers, and run day-to-day development workflows from the command line.
                - paragraph [ref=e423]: "Public repository:"
                - list [ref=e424]:
                  - listitem [ref=e425]:
                    - text: "GitHub:"
                    - code [ref=e426]: https://github.com/SiChuchen/soma-code
                - generic [ref=e427]:
                  - heading "Project Positioning" [level=2] [ref=e428]
                  - 'link "Permalink: Project Positioning" [ref=e429] [cursor=pointer]':
                    - /url: "#project-positioning"
                    - img [ref=e430]
                - paragraph [ref=e432]: "Soma Code is not just a chat interface in a terminal. It is intended to be a practical coding agent CLI that can:"
                - list [ref=e433]:
                  - listitem [ref=e434]: understand the current working directory and project context
                  - listitem [ref=e435]: configure models, providers, and authentication interactively
                  - listitem [ref=e436]: read and write local files as part of development workflows
                  - listitem [ref=e437]: support both user-level and project-level configuration
                  - listitem [ref=e438]: work with multiple provider styles instead of being tied to a single vendor
                - generic [ref=e439]:
                  - heading "Core Capabilities" [level=2] [ref=e440]
                  - 'link "Permalink: Core Capabilities" [ref=e441] [cursor=pointer]':
                    - /url: "#core-capabilities"
                    - img [ref=e442]
