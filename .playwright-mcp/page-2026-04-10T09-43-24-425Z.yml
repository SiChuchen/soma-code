                  - listitem [ref=e446]:
                    - text: Unified provider and API configuration through
                    - code [ref=e447]: /config
                  - listitem [ref=e448]:
                    - text: Login-oriented flows through
                    - code [ref=e449]: /login
                  - listitem [ref=e450]:
                    - text: Model inspection and switching through
                    - code [ref=e451]: /model
                  - listitem [ref=e452]: Support for OpenAI-compatible providers
                  - listitem [ref=e453]:
                    - text: User configuration stored under
                    - code [ref=e454]: ~/.soma
                  - listitem [ref=e455]:
                    - text: Project configuration stored under
                    - code [ref=e456]: .soma/
                  - listitem [ref=e457]: Compatibility layers for legacy remote and migration workflows
